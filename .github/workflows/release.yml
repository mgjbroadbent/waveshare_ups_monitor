name: Release

# Triggered by a published GitHub Release. The idiomatic GitHub flow is to
# create the release -- which creates its tag as part of the flow -- from the UI
# or API; this workflow then builds the binary and attaches it to that release.
# `published` fires for releases published from a draft, unlike `created` or
# `prereleased`, so it is the reliable trigger for asset-building automation.
on:
  release:
    types: [published]

# Needed to upload the built asset onto the release.
permissions:
  contents: write

jobs:
  build-and-upload:
    # Native Linux aarch64 runner, matching the CI build target.
    runs-on: ubuntu-24.04-arm
    env:
      TAG: ${{ github.event.release.tag_name }}
    steps:
      - uses: actions/checkout@v7
        with:
          # Build the exact commit the release tag points at.
          ref: ${{ github.event.release.tag_name }}

      - name: Verify Cargo.toml version matches the release tag
        run: |
          # Read the version from the [package] table only, so a `version` key
          # under [dependencies] can never be picked up by mistake.
          cargo_version="$(awk -F' *= *' '
            /^\[/ { in_pkg = ($0 == "[package]") }
            in_pkg && $1 == "version" { gsub(/"/, "", $2); print $2; exit }
          ' Cargo.toml)"
          tag_version="${TAG#v}"
          if [[ "${cargo_version}" != "${tag_version}" ]]; then
            echo "Cargo.toml version (${cargo_version}) does not match release tag (${tag_version})." >&2
            exit 1
          fi
          echo "Cargo.toml version matches release tag: ${tag_version}"

      - name: Install the latest stable Rust
        run: |
          rustup update stable
          rustup default stable
          rustc --version

      - uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --locked --verbose

      - name: Stage the executable
        run: |
          install -Dm755 target/release/waveshare-ups \
            "dist/waveshare-ups-${TAG}-linux-aarch64"

      - name: Attach the executable to the release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${TAG}" \
            "dist/waveshare-ups-${TAG}-linux-aarch64" \
            --repo "${GITHUB_REPOSITORY}" \
            --clobber
